name: ai_form_vault
description: "AI Form & Vault - Store once. Understand forever. Reuse everywhere."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  percent_indicator: ^4.2.5
  shimmer: ^3.0.0
  gap: ^3.0.1
  google_sign_in: ^6.2.2
  image_picker: ^1.1.2
  shared_preferences: ^2.3.5
  uuid: ^4.5.1
  google_mlkit_text_recognition: ^0.15.1
  google_mlkit_document_scanner: ^0.4.1
  camera: ^0.11.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  image: ^4.8.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#6366F1"
  adaptive_icon_foreground: "assets/icon.png"
