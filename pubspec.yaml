name: ai_form_vault
description: "AI Form & Vault - Store once. Understand forever. Reuse everywhere."
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  gap: ^3.0.1
  image_picker: ^1.1.2
  shared_preferences: ^2.3.5
  uuid: ^4.5.1
  google_mlkit_text_recognition: ^0.15.1
  google_mlkit_document_scanner: ^0.4.1
  camera: ^0.11.1
  path_provider: ^2.1.5
  share_plus: ^13.1.0
  # Networking (Gemini REST API)
  http: ^1.3.0
  # Encrypted local storage
  sqflite_sqlcipher: ^3.3.1
  flutter_secure_storage: ^10.3.1
  cryptography: ^2.7.0
  # Utilities
  path: ^1.9.0
  intl: ^0.20.2
  collection: ^1.19.0
  image: ^4.8.0
  local_auth: ^3.0.1
  flutter_local_notifications: ^22.0.1
  flutter_timezone: ^5.1.0
  timezone: ^0.11.1
  file_selector: ^1.0.3
  pdfx: ^2.9.2
  archive: ^4.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#D97757"
  adaptive_icon_foreground: "assets/icon_fg.png"
